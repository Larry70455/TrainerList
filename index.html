<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leads Training Checklist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0F1111; --muted:#5A6268; --navy:#131A22; --navy-soft:#232F3E;
    --blue:#00A8E1; --blue-deep:#0090C4; --blue-tint:#E3F6FC;
    --red:#D13C2E; --red-tint:#FBE6E3; --yellow:#C98A1A; --yellow-tint:#FCF1DD;
    --green:#1E8E5A; --green-tint:#E6F5EC;
    --hairline:#D9DEE2; --paper:#FFFFFF; --shell:#EDF1F3;
    --page-w:749px;
  }
  *{box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  html,body{margin:0;}
  body{background:var(--shell);font-family:'Inter',-apple-system,'Segoe UI',Roboto,Arial,sans-serif;color:var(--ink);padding:18px 0 40px;}
  .viewport{display:flex;justify-content:center;overflow-x:auto;}
  .scale-holder{position:relative;}
  .scale-outer{position:absolute;top:0;left:0;transform-origin:top left;}
  .sheet{width:var(--page-w);background:var(--paper);border:1px solid var(--hairline);border-radius:10px;box-shadow:0 12px 30px rgba(0,0,0,0.10);overflow:visible;position:relative;}
  .topbar{background:var(--navy);color:#fff;padding:13px 18px;display:flex;align-items:center;gap:13px;flex-wrap:wrap;}
  .topbar img{width:40px;height:40px;border-radius:8px;background:#fff;padding:3px;flex:0 0 auto;}
  .topbar .titles{flex:1;min-width:160px;}
  h1{font-family:'Oswald',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:0.03em;font-size:17px;margin:0;color:#fff;}
  .topbar .sub{font-size:10px;color:var(--blue);margin-top:2px;font-weight:600;letter-spacing:0.02em;}
  .metafield{display:flex;align-items:baseline;gap:6px;font-size:10px;color:#cfd8de;white-space:nowrap;flex:0 0 auto;}
  .metafield input{border:none;border-bottom:1px solid var(--blue);background:transparent;font-family:'Inter',sans-serif;font-size:11px;width:120px;padding:2px 0;color:#fff;}
  .metafield input:focus{outline:none;}
  .smile{height:5px;background:linear-gradient(90deg, var(--blue) 0%, var(--blue) 70%, var(--navy-soft) 100%);}
  .page-content{padding:14px 24px 22px;}

  [contenteditable="true"]{outline:1.5px dashed var(--blue-deep);outline-offset:2px;border-radius:3px;background:rgba(0,168,225,0.06);}
  [contenteditable="true"]:focus{outline:1.5px solid var(--blue-deep);background:rgba(0,168,225,0.12);}

  .hint{display:none;background:var(--navy-soft);color:#fff;border-radius:7px;padding:7px 11px;font-size:10.5px;line-height:1.4;margin-bottom:10px;}
  body.editing .hint{display:block;}
  .hint b{color:var(--blue);}

  .sections-wrap{display:flex;flex-wrap:wrap;gap:11px;}
  .sections-wrap .section-block{flex:1 1 100%;min-width:0;}
  .sections-wrap.cols-2 .section-block{flex:1 1 calc(50% - 5.5px);}
  .sections-wrap.cols-2 .section-block[data-kind="banner"]{flex:1 1 100%;}

  .section-block{position:relative;break-inside:avoid;}
  .section-block.dragging{opacity:0.35;}
  .section-block.stage-card{border:1.5px solid transparent;border-radius:8px;padding:9px 11px 6px;}
  .section-block.dashed{border:1.5px dashed var(--navy-soft);border-radius:8px;padding:10px 12px 7px;background:var(--blue-tint);}

  .stage-head{display:flex;align-items:center;gap:7px;margin-bottom:7px;}
  .drag-handle{flex:0 0 auto;display:none;cursor:grab;color:var(--muted);font-size:19px;width:30px;height:30px;text-align:center;user-select:none;touch-action:none;align-items:center;justify-content:center;}
  body.editing .drag-handle{display:flex;}
  .badge{flex:0 0 auto;width:23px;height:23px;border-radius:50%;border:2px solid var(--navy-soft);color:var(--navy-soft);font-family:'Oswald',sans-serif;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;background:#fff;}
  .stage-title{font-family:'Oswald',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;font-size:13px;color:var(--navy-soft);flex:1;min-width:0;}
  .sec-actions{display:none;flex:0 0 auto;gap:4px;align-items:center;}
  body.editing .sec-actions{display:flex;}
  .icon-btn{width:28px;height:28px;border-radius:50%;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;line-height:1;}
  .gear-btn{background:var(--navy-soft);color:#fff;}
  .del-section{background:#E2453B;color:#fff;}

  .popover{position:absolute;right:0;top:30px;z-index:30;background:#fff;border:1px solid var(--hairline);border-radius:8px;box-shadow:0 8px 22px rgba(0,0,0,0.18);padding:10px;width:210px;display:none;}
  .popover.open{display:block;}
  .popover .pgroup{margin-bottom:7px;}
  .popover .plabel{font-size:9px;text-transform:uppercase;letter-spacing:0.04em;color:var(--muted);font-weight:700;margin-bottom:4px;}
  .swatches{display:flex;gap:5px;}
  .swatch{width:27px;height:27px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
  .swatch.sel{border-color:var(--ink);}
  .icon-choices{display:flex;flex-wrap:wrap;gap:5px;}
  .icon-choice{width:31px;height:31px;border-radius:6px;border:1.5px solid var(--hairline);background:#fff;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;}
  .icon-choice.sel{border-color:var(--blue-deep);background:var(--blue-tint);}
  .popover label.dashedrow{display:flex;align-items:center;gap:6px;font-size:11px;cursor:pointer;}

  ul.items{list-style:none;margin:0;padding:0;border-top:1px solid var(--hairline);}
  li.item-row{display:flex;align-items:flex-start;border-bottom:1px solid var(--hairline);break-inside:avoid;}
  .item{display:flex;align-items:flex-start;gap:9px;padding:6px 2px;flex:1;min-width:0;cursor:pointer;}
  .item input[type="checkbox"]{flex:0 0 auto;width:16px;height:16px;margin-top:2px;accent-color:var(--blue-deep);cursor:pointer;}
  .item-text{font-size:12.5px;line-height:1.4;display:block;min-width:0;}
  .item-text .sub{display:block;font-size:11.5px;color:var(--muted);margin-top:2px;}
  .item-text .sublist{list-style:none;margin:4px 0 0;padding:0;display:grid;gap:2px;}
  .item-text .sublist li{position:relative;padding-left:13px;font-size:11.5px;color:var(--muted);line-height:1.45;}
  .item-text .sublist li:before{content:'';position:absolute;left:0;top:5px;width:6px;height:6px;background:var(--blue-deep);border-radius:1.5px;}
  .item input:checked ~ .item-text{text-decoration:line-through;color:var(--muted);}
  .item-date{flex:0 0 auto;font-size:10.5px;color:var(--muted);align-self:center;min-width:74px;text-align:right;padding:6px 4px;border-bottom:1px solid var(--hairline);margin:6px 2px;}
  .item-date:empty:before{content:'date';color:#c7ccd0;}
  .del-item{flex:0 0 auto;align-self:center;width:24px;height:24px;border-radius:50%;border:none;background:#E2453B;color:#fff;font-size:14px;line-height:1;cursor:pointer;margin:6px 4px 6px 0;display:none;align-items:center;justify-content:center;}
  body.editing .del-item{display:flex;}
  .add-item{display:none;margin-top:5px;border:1.5px dashed var(--blue-deep);background:#fff;color:var(--blue-deep);font-size:11px;font-weight:600;border-radius:6px;padding:4px 9px;cursor:pointer;align-items:center;gap:4px;}
  body.editing .add-item{display:inline-flex;}

  .banner{border-radius:8px;padding:9px 13px;display:flex;align-items:center;gap:11px;color:#fff;}
  .banner .badge{background:#fff;}
  .banner .btext{font-size:12px;line-height:1.32;flex:1;min-width:0;}
  .banner .btitle{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.03em;font-size:11.5px;display:block;margin-bottom:1px;font-weight:700;}

  .add-section-row{display:none;gap:8px;margin-top:6px;}
  body.editing .add-section-row{display:flex;}
  .add-section-btn{flex:1;border:1.5px dashed var(--navy-soft);background:#fff;color:var(--navy-soft);font-size:11.5px;font-weight:600;border-radius:7px;padding:8px 10px;cursor:pointer;}

  .toolbar{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:center;margin-top:14px;padding:0 12px;}
  .toolbar button{font-family:'Inter',sans-serif;font-weight:600;font-size:12.5px;padding:9px 16px;border-radius:6px;cursor:pointer;border:1.5px solid var(--navy);background:var(--navy);color:#fff;display:inline-flex;align-items:center;gap:6px;}
  .toolbar button.secondary{background:transparent;color:var(--navy);}
  .toolbar button.editing-active{background:#1E8E5A;border-color:#1E8E5A;}
  .fit-status{font-size:11px;color:var(--muted);text-align:center;margin-top:4px;}
  .fit-status.warn{color:#D13C2E;font-weight:600;}

  @media print{
    body{background:#fff;padding:0;margin:0;}
    .viewport{display:block;overflow:visible;}
    .scale-holder{width:auto !important;height:auto !important;}
    .scale-outer{position:static !important;transform:none !important;}
    .sheet{box-shadow:none;border:none;border-radius:0;width:auto;}
    .toolbar,.fit-status,.hint{display:none !important;}
    [contenteditable="true"]{outline:none;background:none;}
    .drag-handle,.sec-actions,.del-item,.add-item,.add-section-row{display:none !important;}
    .item-date:empty:before{content:'';}
    @page{size:letter;margin:0.4in;}
  }
</style>
</head>

    if(f && !f.value) f.value = mm+'/'+dd+'/'+d.getFullYear();
  })();

  document.addEventListener('click', function(e){
    if(!document.body.classList.contains('editing')) return;
    var label=e.target.closest('label.item');
    if(label && e.target.tagName!=='INPUT') e.preventDefault();
  });

  function fitOuter(){
    var totalW=749, totalH=sheet.offsetHeight;
    var available=scaleHolder.parentElement.clientWidth-16;
    var s=Math.min(1, available/totalW);
    if(document.body.classList.contains('editing')) s=Math.max(s, 0.82);
    scaleOuter.style.transform='scale('+s+')'; scaleOuter.style.width=totalW+'px';
    scaleHolder.style.width=(totalW*s)+'px'; scaleHolder.style.height=(totalH*s)+'px';
  }
  var fitTimer=null;
  function scheduleFit(){ clearTimeout(fitTimer); fitTimer=setTimeout(fitOuter,60); }

  function renumber(){
    var n=1;
    sectionsWrap.querySelectorAll('.section-block').forEach(function(sec){
      if(sec.dataset.kind==='stage' && sec.dataset.icon==='auto'){
        sec.querySelector('.badge').innerHTML=n; n++;
      }
    });
  }
  function hexTint(hex){
    var map={'#232F3E':'#EDEFF1','#00A8E1':'#E3F6FC','#D13C2E':'#FBE6E3','#C98A1A':'#FCF1DD','#1E8E5A':'#E6F5EC'};
    return map[hex] || '#F4F4F4';
  }
  function applyStyle(sec){
    var kind=sec.dataset.kind, color=COLORS[sec.dataset.color]||COLORS.navy, icon=sec.dataset.icon;
    var badge=sec.querySelector('.badge');
    if(kind==='banner'){
      var box=sec.querySelector('.banner');
      box.style.background=color;
      badge.style.color=color; badge.style.borderColor='transparent';
      badge.innerHTML = icon==='auto' ? '&#9733;' : ICONS[icon];
    } else {
      if(sec.dataset.dashed==='1'){
        sec.classList.add('dashed'); sec.style.borderColor=color; sec.style.background=hexTint(color);
      } else {
        sec.classList.remove('dashed'); sec.style.background='';
        sec.style.borderColor = (sec.dataset.color && sec.dataset.color!=='navy') ? color : 'transparent';
      }
      badge.style.color=color; badge.style.borderColor=color;
      badge.innerHTML = icon==='auto' ? '' : ICONS[icon];
    }
  }
  function closeAllPopovers(){ document.querySelectorAll('.popover.open').forEach(function(p){ p.classList.remove('open'); }); }
  function buildPopover(sec){
    var kind=sec.dataset.kind;
    var iconKeys = kind==='stage' ? ['auto','star','exclaim','warning','check','dot'] : ['star','exclaim','warning','check','dot'];
    var pop=document.createElement('div'); pop.className='popover';
    var html='<div class="pgroup"><div class="plabel">Color</div><div class="swatches">';
    Object.keys(COLORS).forEach(function(k){
      html += '<div class="swatch'+(sec.dataset.color===k?' sel':'')+'" data-color="'+k+'" style="background:'+COLORS[k]+'"></div>';
    });
    html += '</div></div><div class="pgroup"><div class="plabel">Icon</div><div class="icon-choices">';
    iconKeys.forEach(function(k){
      html += '<div class="icon-choice'+(sec.dataset.icon===k?' sel':'')+'" data-icon="'+k+'">'+ICONS[k]+'</div>';
    });
    html += '</div></div>';
    if(kind==='stage'){
      html += '<label class="dashedrow"><input type="checkbox" class="dashedchk" '+(sec.dataset.dashed==='1'?'checked':'')+'> Dashed callout style</label>';
    }
    pop.innerHTML = html;
    pop.addEventListener('click', function(e){
      e.stopPropagation();
      var sw=e.target.closest('.swatch');
      if(sw){ sec.dataset.color=sw.dataset.color; pop.querySelectorAll('.swatch').forEach(function(x){x.classList.remove('sel');}); sw.classList.add('sel'); applyStyle(sec); renumber(); save(); }
      var ic=e.target.closest('.icon-choice');
      if(ic){ sec.dataset.icon=ic.dataset.icon; pop.querySelectorAll('.icon-choice').forEach(function(x){x.classList.remove('sel');}); ic.classList.add('sel'); applyStyle(sec); renumber(); save(); }
      if(e.target.classList.contains('dashedchk')){ sec.dataset.dashed = e.target.checked ? '1' : '0'; applyStyle(sec); save(); }
    });
    return pop;
  }

  function makeItemRow(text, date){
    var li=document.createElement('li'); li.className='item-row';
    li.innerHTML='<label class="item"><input type="checkbox"><span class="item-text" contenteditable="false">'+text+'</span></label>'+
      '<span class="item-date" contenteditable="false">'+(date||'')+'</span>'+
      '<button class="del-item">&times;</button>';
    return li;
  }
  function selectText(el){
    var r=document.createRange(); r.selectNodeContents(el);
    var s=window.getSelection(); s.removeAllRanges(); s.addRange(r);
  }
  function makeSection(kind, opts){
    opts = opts || {};
    var sec=document.createElement('section');
    sec.className = 'section-block' + (kind==='stage' ? ' stage-card' : '');
    sec.dataset.kind = kind;
    sec.dataset.color = opts.color || (kind==='banner' ? 'blue' : 'navy');
    sec.dataset.icon = opts.icon || (kind==='stage' ? 'auto' : 'star');
    sec.dataset.dashed = opts.dashed ? '1' : '0';
    var head =
      '<div class="stage-head">'+
        '<span class="drag-handle">&#10021;</span>'+
        '<div class="badge"></div>'+
        '<div class="stage-title" contenteditable="false">'+(opts.title||'New Section')+'</div>'+
        '<div class="sec-actions">'+
          '<button class="icon-btn gear-btn" title="Icon &amp; color">&#9881;</button>'+
          '<button class="icon-btn del-section" title="Remove section">&times;</button>'+
        '</div>'+
      '</div>';
    if(kind==='banner'){
      var bar=document.createElement('div');
      bar.className='stage-head'; bar.style.marginBottom='4px';
      bar.innerHTML='<span class="drag-handle">&#10021;</span><div style="flex:1;"></div><div class="sec-actions"><button class="icon-btn gear-btn" title="Icon &amp; color">&#9881;</button><button class="icon-btn del-section" title="Remove section">&times;</button></div>';
      sec.appendChild(bar);
      var box=document.createElement('div');
      box.className='banner';
      box.innerHTML='<div class="badge" style="margin-left:0;"></div>'+
        '<div class="btext"><span class="btitle" contenteditable="false">'+(opts.title2||'Banner')+'</span>'+
        '<span class="bbody" contenteditable="false">'+(opts.body||'Add details here&hellip;')+'</span></div>';
      sec.appendChild(box);
    } else {
      sec.innerHTML = head + '<ul class="items"></ul><button class="add-item">&#43; Add item</button>';
      (opts.items||[['New item','']]).forEach(function(it){ sec.querySelector('ul.items').appendChild(makeItemRow(it[0], it[1])); });
    }
    applyStyle(sec);
    return sec;
  }

  document.addEventListener('click', function(e){
    if(!e.target.closest('.popover') && !e.target.closest('.gear-btn')) closeAllPopovers();
    if(e.target.classList.contains('gear-btn')){
      var sec=e.target.closest('.section-block');
      var existing=sec.querySelector('.popover');
      if(existing){ var willOpen=!existing.classList.contains('open'); closeAllPopovers(); if(willOpen) existing.classList.add('open'); }
      else { closeAllPopovers(); var pop=buildPopover(sec); sec.querySelector('.sec-actions').appendChild(pop); pop.classList.add('open'); }
      return;
    }
    if(e.target.classList.contains('add-item')){
      var ul=e.target.previousElementSibling, row=makeItemRow('New item','');
      ul.appendChild(row);
      row.querySelectorAll('.item-text,.item-date').forEach(function(el){ el.setAttribute('contenteditable','true'); });
      var span=row.querySelector('.item-text'); span.focus(); selectText(span);
      scheduleFit(); save(); return;
    }
    if(e.target.classList.contains('del-item')){
      var row=e.target.closest('li.item-row'); row.parentElement.removeChild(row);
      scheduleFit(); save(); return;
    }
    if(e.target.classList.contains('del-section')){
      var sec2=e.target.closest('.section-block'); sec2.parentElement.removeChild(sec2);
      renumber(); scheduleFit(); save(); return;
    }
    if(e.target.classList.contains('add-section-btn')){
      var kind=e.target.dataset.newkind;
      var sec3 = kind==='banner' ? makeSection('banner',{title2:'New Banner', body:'Add details here\u2026'}) : makeSection('stage',{title:'New Section', items:[['New item','']]});
      sectionsWrap.appendChild(sec3);
      sec3.draggable = true; attachDrag(sec3);
      sec3.querySelectorAll('.stage-title,.btitle,.bbody,.item-text,.item-date').forEach(function(el){ el.setAttribute('contenteditable','true'); });
      var t = sec3.querySelector('.stage-title, .btitle');
      t.focus(); selectText(t);
      renumber(); scheduleFit(); save(); return;
    }
  });
  document.addEventListener('input', function(e){ if(e.target.isContentEditable) scheduleFit(); save(); });

  var btnEdit=document.getElementById('btnEdit');
  var userEditedSinceLoad=false;
  function setEditing(on){
    if(on) userEditedSinceLoad = true;
    document.body.classList.toggle('editing', on);
    document.querySelectorAll('.stage-title,.btitle,.bbody,.item-text,.item-date,#docTitle,#docSub').forEach(function(el){ el.setAttribute('contenteditable', on?'true':'false'); });
    sectionsWrap.querySelectorAll('.section-block').forEach(function(sec){ sec.draggable = on; });
    btnEdit.innerHTML = on ? '&#10003; Done Editing' : '&#9998; Edit';
    btnEdit.classList.toggle('editing-active', on);
    if(!on) closeAllPopovers();
    scheduleFit(); save();
  }
  btnEdit.addEventListener('click', function(){ setEditing(!document.body.classList.contains('editing')); });

  var btnLayout=document.getElementById('btnLayout');
  btnLayout.addEventListener('click', function(){
    var two=sectionsWrap.classList.toggle('cols-2');
    btnLayout.innerHTML = two ? '&#9638; 1-Column Layout' : '&#9638; 2-Column Layout';
    scheduleFit(); save();
  });
  document.getElementById('btnPrint').addEventListener('click', function(){ window.print(); });
  document.getElementById('btnReset').addEventListener('click', function(){
    document.querySelectorAll('.item input[type=checkbox]').forEach(function(c){ c.checked=false; });
  });
  document.getElementById('btnResetDefault').addEventListener('click', function(){
    var ok = confirm('Reset to the default training checklist?\n\nThis will erase every change you\u2019ve made (sections, items, dates, checkmarks) and bring back the original. This can\u2019t be undone.');
    if(!ok) return;
    defaultSections();
    sectionsWrap.classList.remove('cols-2');
    btnLayout.innerHTML = '&#9638; 2-Column Layout';
    document.getElementById('docTitle').textContent = 'Leads Training Checklist';
    document.getElementById('docSub').textContent = 'DEE RO LOGISTICS \u00b7 Amazon DSP';
    scheduleFit(); save();
  });

  var draggedEl=null;
  function moveDuringDrag(clientX, clientY){
    if(!draggedEl) return;
    var el = document.elementFromPoint(clientX, clientY);
    var target = el && el.closest ? el.closest('.section-block') : null;
    if(!target || target===draggedEl) return;
    var rect=target.getBoundingClientRect();
    var before=(clientY - rect.top) < rect.height/2;
    sectionsWrap.insertBefore(draggedEl, before?target:target.nextSibling);
  }
  function endDrag(){
    if(!draggedEl) return;
    draggedEl.classList.remove('dragging'); draggedEl=null;
    renumber(); scheduleFit(); save();
  }
  function attachDrag(sec){
    sec.addEventListener('dragstart', function(e){ draggedEl=sec; sec.classList.add('dragging'); });
    sec.addEventListener('dragend', endDrag);
    var handle = sec.querySelector('.drag-handle');
    if(handle){
      handle.addEventListener('touchstart', function(e){
        if(!document.body.classList.contains('editing')) return;
        e.preventDefault();
        draggedEl = sec; sec.classList.add('dragging');
      }, {passive:false});
    }
  }
  document.addEventListener('touchmove', function(e){
    if(!draggedEl) return;
    e.preventDefault();
    var t=e.touches[0];
    moveDuringDrag(t.clientX, t.clientY);
  }, {passive:false});
  document.addEventListener('touchend', endDrag);
  document.addEventListener('touchcancel', endDrag);
  sectionsWrap.addEventListener('dragover', function(e){
    e.preventDefault();
    if(!draggedEl) return;
    var target=e.target.closest('.section-block');
    if(!target || target===draggedEl) return;
    var rect=target.getBoundingClientRect();
    var before=(e.clientY - rect.top) < rect.height/2;
    sectionsWrap.insertBefore(draggedEl, before?target:target.nextSibling);
  });

  // ---------- persistence ----------
  var SKEY='leads-training-sections-v1', LKEY='leads-training-layout-v1', TKEY='leads-training-titles-v1';
  function setSync(state){
    if(!syncStatus) return;
    if(state==='saving'){ syncStatus.innerHTML='&#9729; Saving...'; syncStatus.classList.remove('warn'); }
    else if(state==='synced'){ syncStatus.innerHTML='&#9729; Synced across your devices'; syncStatus.classList.remove('warn'); }
    else if(state==='local'){ syncStatus.innerHTML='&#9729; Saved on this device (cloud sync off)'; syncStatus.classList.add('warn'); }
  }
  function currentState(){
    return {
      sectionsHTML: sectionsWrap.innerHTML,
      layout: sectionsWrap.classList.contains('cols-2') ? '2' : '1',
      title: document.getElementById('docTitle').textContent,
      sub: document.getElementById('docSub').textContent,
      trainee: document.getElementById('traineeInput').value,
      updatedAt: Date.now()
    };
  }
  var saveTimer=null;
  function save(){
    var state=currentState();
    if(window.storage){
      try{
        window.storage.set(SKEY, state.sectionsHTML).catch(function(){});
        window.storage.set(LKEY, state.layout).catch(function(){});
        window.storage.set(TKEY, JSON.stringify({title:state.title, sub:state.sub, trainee:state.trainee})).catch(function(){});
      }catch(err){}
    }
    clearTimeout(saveTimer);
    saveTimer=setTimeout(function(){
      if(window.cloudReady && window.cloudSave){
        setSync('saving');
        window.cloudSave(state).then(function(){ setSync('synced'); }).catch(function(){ setSync('local'); });
      } else { setSync('local'); }
    }, 400);
  }
  document.getElementById('traineeInput').addEventListener('input', save);
  function applyCloudData(data){
    sectionsWrap.innerHTML = data.sectionsHTML;
    sectionsWrap.querySelectorAll('.section-block').forEach(function(sec){ applyStyle(sec); attachDrag(sec); });
    renumber();
    if(data.layout==='2'){ sectionsWrap.classList.add('cols-2'); btnLayout.innerHTML='&#9638; 1-Column Layout'; }
    if(data.title) document.getElementById('docTitle').textContent=data.title;
    if(data.sub) document.getElementById('docSub').textContent=data.sub;
    if(data.trainee) document.getElementById('traineeInput').value=data.trainee;
  }

  function defaultSections(){
    sectionsWrap.innerHTML='';
    function add(kind, opts){ var s=makeSection(kind, opts); sectionsWrap.appendChild(s); }

    add('stage',{icon:'auto', title:'Dispatch Coordination', items:[
      ["Assigning vans and managing sweepers/recycle routes<ul class=\"sublist\"><li>Posting route assignment process (do not post early)</li><li>Edit route assignments</li><li>Create DSP Initiated Block</li><li>Explain route types (i.e. Nursery Route Levels)</li><li>Bag Assignment/Equipment Process</li><li>Loadout Pad Assignments/Staging/Swipe To Finish</li><li>Assigning Sweeper Totes</li></ul>",""],
      ["Managing rostered routes affected by call-offs/tardiness",""],
      ["Tracking attendance &amp; sign-in/out process<span class=\"sub\">Notate in the Leads Chat and Impacted DA Chat when a DA is Late or No Call No Show, and highlight on the attendance sheet. The Dispatcher must call the impacted DA.</span>",""],
      ["Paycom Kiosk Process",""],
      ["Monitoring Productivity and Non-productivity via Cortex V2",""],
      ["GeoStudio Process",""],
      ["Setting up new DA&rsquo;s WhatsApp Chat group expectations",""],
      ["Powered App / Gas Card Process",""],
      ["UPD &ndash; Unplanned Delay Process (now automatic)",""],
      ["Deploying rescues &amp; overseeing RTS process",""],
      ["DVIC Process, including manual DVIC",""],
      ["AVI Process (i.e. Tunnel)",""],
      ["DERO&rsquo;s Vehicle Inspection Process",""],
      ["Clean and pesticide (as needed) RTS process",""]
    ]});

    add('stage',{icon:'auto', title:'Performance Management', items:[
      ["Analyze weekly performance scorecards &amp; sharing insights<ul class=\"sublist\"><li>Scorecard Overviews with DAs on Standby Shifts</li><li>Scorecard Drilldowns, minimum 5 per shift</li><li>Scorecard Dispute Process</li></ul>",""],
      ["In-Person and WhatsApp Coaching Expectations",""],

      ["Recognition Process Expectations, including EOM",""],

    ]});

    add('stage',{icon:'auto', title:'Timecard Management', items:[
      ["Paycom Who&rsquo;s Clocked In Reporting",""],
      ["Timekeeping Policy Expectations Review, including lunch punches",""],
      ["Working Hours Compliance Review",""]
    ]});

    add('stage',{icon:'auto', title:'Recruiting &amp; Hiring', items:[
      ["Participating in hiring events, conducting interviews, &amp; candidate follow-up<ul class=\"sublist\"><li>Paycom review</li><li>SmartRecruiters review</li><li>Cortex Onboarding review</li><li>Checkr/Accurate review</li><li>Quest review</li></ul>",""],
      ["Core Delivery Associate Training (CDAT) program review",""]

    add('stage',{icon:'auto', title:'Communication Management', items:[
      ["Reviewing and following up on actionable items via Slack, email, Google Docs, etc. (check constantly throughout the day)",""],

    ]});

    add('stage',{icon:'auto', title:'Safety &amp; Fleet Management', items:[

    ]});

    add('stage',{icon:'auto', title:'Phones', items:[
      ["Phone and Charger assignment process",""],

    ]});

    add('stage',{icon:'auto', title:'Uniform Tracking', items:[
      ["Conduct daily uniform audits to ensure ALL DAs are compliant<span class=\"sub\">Notate non-compliance in the impacted DA&rsquo;s chat group and follow up with CA.</span>",""],
      ["Review uniform audit reports",""],

    ]});

    add('stage',{icon:'auto', title:'Miscellaneous Functions', items:[
      ["Conducting SU (Stand-Up/Start-Up) meetings<span class=\"sub\">Retrieving the weekly newsletter to share key topics with the team.</span>",""]
    ]});

    sectionsWrap.querySelectorAll('.section-block').forEach(attachDrag);
    renumber();
  }

  function loadLocalThenDefault(){
    if(!window.storage){ defaultSections(); return Promise.resolve(); }
    return Promise.resolve(window.storage.get(SKEY)).then(function(res){
      if(res && res.value){
        sectionsWrap.innerHTML = res.value;
        sectionsWrap.querySelectorAll('.section-block').forEach(function(sec){ applyStyle(sec); attachDrag(sec); });
        renumber();
      } else { defaultSections(); }
    }).catch(defaultSections).then(function(){
      return Promise.resolve(window.storage.get(LKEY)).then(function(res){
        if(res && res.value==='2'){ sectionsWrap.classList.add('cols-2'); btnLayout.innerHTML='&#9638; 1-Column Layout'; }
      }).catch(function(){});
    }).then(function(){
      return Promise.resolve(window.storage.get(TKEY)).then(function(res){
        if(res && res.value){
          try{ var t=JSON.parse(res.value); document.getElementById('docTitle').textContent=t.title; document.getElementById('docSub').textContent=t.sub; if(t.trainee) document.getElementById('traineeInput').value=t.trainee; }catch(e){}
        }
      }).catch(function(){});
    });
  }
  function backgroundCloudSync(){
    function tryCloud(){
      window.cloudLoad().then(function(data){
        if(!userEditedSinceLoad && data && data.sectionsHTML && data.sectionsHTML !== sectionsWrap.innerHTML){
          applyCloudData(data); scheduleFit();
        }
        setSync('synced');
      }).catch(function(){ setSync('local'); });
    }
    if(window.cloudReady && window.cloudLoad){ tryCloud(); }
    else {
      var done=false;
      var timeout=setTimeout(function(){ if(!done){ done=true; setSync('local'); } }, 4000);
      window.addEventListener('cloudready', function once(){
        window.removeEventListener('cloudready', once);
        if(done) return; done=true; clearTimeout(timeout);
        if(window.cloudReady && window.cloudLoad) tryCloud(); else setSync('local');
      });
    }
  }
  function load(){
    loadLocalThenDefault().then(function(){ scheduleFit(); backgroundCloudSync(); });
  }

  window.addEventListener('resize', scheduleFit);
  if(document.fonts && document.fonts.ready) document.fonts.ready.then(scheduleFit);
  load();
  setTimeout(scheduleFit,250);
})();
</script>
